<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tea House Revision</title>
    <!-- tailwindCSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- fontAwesome -->
    <script
      src="https://kit.fontawesome.com/a627f1b95a.js"
      crossorigin="anonymous"
    ></script>

    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: "Manrope", sans-serif;
      }
    </style>
  </head>
  <body>
    <!-- banner section -->
    <section class="grid grid-cols-1 md:grid-cols-2 max-w-[80%] mx-auto">
      <div class="banner-left space-y-8">
        <h1 class="text-[80px] text-[#1C1C1C] font-extrabold">
          It's good <br />
          tea time at The <br />
          Tea House
        </h1>
        <p class="text-[#777777]">
          Tea and Botanical Solutions Supplier Give Optimum <br />
          Satisfaction To Your Taste Buds.
        </p>
        <button
          class="py-3 px-5 rounded-lg text-white bg-linear-to-r from-[#FF8938] to-[#FF0000]"
        >
          Explore More
          <span class="-rotate-45 inline-block">
            <i class="fa-solid fa-arrow-right-long"></i>
          </span>
        </button>
      </div>
      <div class="banner-right flex justify-end items-end relative">
        <img src="./images/banner.png" alt="" />
        <!-- rating div -->
        <div
          class="flex justify-center items-center bg-white shadow-2xl absolute left-[70px] bottom-2 md:left-[220px] rounded-md px-2 w-[260px]"
        >
          <img src="./images/rating-star.png" alt="" />
          <div class="p-[15px] flex flex-col">
            <h2 class="font-bold">5.00</h2>
            <p class="text-[#777777]">Trust Pilot Ratings</p>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
